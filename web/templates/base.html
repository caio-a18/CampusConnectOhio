<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CampusConnect{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
    <a class="nav-brand" href="{{ url_for('index') }}">CampusConnect</a>
    <div class="nav-links">
        <a href="{{ url_for('index') }}">Search</a>
        {% if session.user_id %}
            <a href="{{ url_for('profile') }}">My Schools</a>
            <a href="{{ url_for('logout') }}">Logout ({{ session.user_name }})</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container">

    <!-- Flash messages (success, error, info) -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-messages">
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
